# Build and publish binaries when a version tag is pushed.
#
# Trigger: git tag v0.1.0 && git push --tags
# Result: GitHub Release with binaries for macOS + Linux (arm64 + amd64)
#
# Ruby analogy: This is like a CI job that runs `gem build && gem push`
# when you push a version tag.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
